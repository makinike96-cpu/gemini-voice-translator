<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Voice Translator</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/recorderjs/0.1.0/recorder.js"></script>
    <style>
        body { font-family: sans-serif; background: #1c1c1e; color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .container { text-align: center; width: 90%; max-width: 400px; background: #2c2c2e; padding: 30px; border-radius: 24px; }
        select { width: 100%; padding: 15px; border-radius: 12px; background: #3a3a3c; color: white; border: 1px solid #48484a; margin-bottom: 30px; font-size: 16px; }
        #micBtn { width: 120px; height: 120px; border-radius: 50%; border: none; background: #0a84ff; color: white; font-size: 40px; cursor: pointer; display: none; }
        #activateBtn { padding: 20px 40px; border-radius: 15px; border: none; background: #34c759; color: white; font-size: 18px; cursor: pointer; }
        #micBtn.recording { background: #ff3b30; }
        .status { margin-top: 20px; color: #8e8e93; font-size: 16px; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Переводчик</h2>
        <select id="langPair">
            <option value="Russian-Polish">Русский ↔ Польский</option>
            <option value="Russian-German">Русский ↔ Немецкий</option>
            <option value="Russian-Spanish">Русский ↔ Испанский</option>
            <option value="Russian-English">Русский ↔ Английский</option>
        </select>
        
        <!-- Кнопка активации, которая появится первой -->
        <button id="activateBtn">Включить микрофон</button>
        
        <!-- Основная кнопка, которая появится после активации -->
        <button id="micBtn">🎤</button>
        
        <div id="status" class="status">Нажмите кнопку выше</div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        let ws;
        let audioContext;
        let recorder;
        const micBtn = document.getElementById('micBtn');
        const activateBtn = document.getElementById('activateBtn');
        const status = document.getElementById('status');

        function connect() {
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            ws = new WebSocket(`${protocol}//${window.location.host}`);
            ws.onopen = () => {
                ws.send(JSON.stringify({ type: 'setup', pair: document.getElementById('langPair').value }));
            };
            ws.onmessage = async (event) => {
                const audioBlob = new Blob([event.data], { type: 'audio/wav' });
                const audio = new Audio(URL.createObjectURL(audioBlob));
                status.innerText = "Играю перевод...";
                await audio.play();
                status.innerText = "Готов";
            };
        }

        connect();

        // Функция активации микрофона
        activateBtn.onclick = async () => {
            try {
                status.innerText = "Запрос доступа...";
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                audioContext = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 16000 });
                const input = audioContext.createMediaStreamSource(stream);
                recorder = new Recorder(input, { numChannels: 1 });
                
                // Прячем кнопку активации, показываем микрофон
                activateBtn.style.display = 'none';
                micBtn.style.display = 'inline-block';
                status.innerText = "Готов! Зажмите микрофон";
            } catch (err) {
                status.innerText = "Ошибка: " + err.message;
            }
        };

        function start() {
            if (recorder) {
                if (audioContext.state === 'suspended') audioContext.resume();
                recorder.clear();
                recorder.record();
                micBtn.classList.add('recording');
                status.innerText = "Слушаю...";
            }
        }

        function stop() {
            if (recorder) {
                recorder.stop();
                micBtn.classList.remove('recording');
                status.innerText = "Обработка...";
                recorder.exportWAV((blob) => {
                    ws.send(blob);
                });
            }
        }

        micBtn.onmousedown = micBtn.ontouchstart = (e) => { e.preventDefault(); start(); };
        micBtn.onmouseup = micBtn.ontouchend = (e) => { e.preventDefault(); stop(); };
    </script>
</body>
</html>
