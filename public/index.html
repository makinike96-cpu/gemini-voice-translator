<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    let ws;
    let audioContext;
    let recorder;
    const micBtn = document.getElementById('micBtn');
    const activateBtn = document.getElementById('activateBtn');
    const status = document.getElementById('status');
    const langSelect = document.getElementById('langPair');

    function connect() {
        const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
        ws = new WebSocket(`${protocol}//${window.location.host}`);
        ws.onopen = () => { status.innerText = "Готов к работе"; };
        ws.onmessage = async (event) => {
            const audioBlob = new Blob([event.data], { type: 'audio/wav' });
            const audio = new Audio(URL.createObjectURL(audioBlob));
            status.innerText = "Играю перевод...";
            await audio.play();
            status.innerText = "Готов";
        };
    }
    connect();

    activateBtn.onclick = async () => {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        audioContext = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 16000 });
        const input = audioContext.createMediaStreamSource(stream);
        recorder = new Recorder(input, { numChannels: 1 });
        activateBtn.style.display = 'none';
        micBtn.style.display = 'inline-block';
        status.innerText = "Зажмите микрофон";
    };

    function start() {
        if (recorder) {
            if (audioContext.state === 'suspended') audioContext.resume();
            recorder.clear();
            recorder.record();
            micBtn.classList.add('recording');
            status.innerText = "Слушаю...";
        }
    }

    function stop() {
        if (recorder) {
            recorder.stop();
            micBtn.classList.remove('recording');
            status.innerText = "Обработка...";
            recorder.exportWAV((blob) => {
                // ОТПРАВЛЯЕМ ЯЗЫК В ЗАГОЛОВКЕ ПЕРЕД АУДИО
                const reader = new FileReader();
                reader.onload = () => {
                    const base64Audio = reader.result.split(',')[1];
                    ws.send(JSON.stringify({
                        type: 'audio_data',
                        pair: langSelect.value,
                        audio: base64Audio
                    }));
                };
                reader.readAsDataURL(blob);
            });
        }
    }

    micBtn.onmousedown = micBtn.ontouchstart = (e) => { e.preventDefault(); start(); };
    micBtn.onmouseup = micBtn.ontouchend = (e) => { e.preventDefault(); stop(); };
</script>
