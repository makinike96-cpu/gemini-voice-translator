<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Голосовой переводчик</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/recorderjs/0.1.0/recorder.js"></script>
  <style>
    body {
      margin: 0; 
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background-color: #000;
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
      padding: 0 20px;
    }
    h1 {
      font-size: 28px;
      margin-bottom: 12px;
      font-weight: 700;
    }
    p.instruction {
      font-size: 16px;
      color: #8e8e93;
      margin-bottom: 40px;
      line-height: 1.4;
    }
    button#activateBtn {
      background-color: #34c759;
      border: none;
      border-radius: 16px;
      color: white;
      font-size: 20px;
      font-weight: 600;
      padding: 20px;
      width: 100%;
      max-width: 400px;
      cursor: pointer;
      transition: background-color 0.2s ease;
    }
    button#activateBtn:active {
      background-color: #28a745;
    }
    #status {
      margin-top: 30px;
      font-size: 15px;
      color: #636366;
      min-height: 20px;
    }
  </style>
</head>
<body>
  <h1>Переводи на любой язык</h1>
  <p class="instruction">
    Чтобы перевести, скажи:<br />
    <strong>«Переведи с русского на польский»</strong>
  </p>
  <button id="activateBtn">Включить микрофон</button>
  <div id="status">Нажмите кнопку выше</div>

  <script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    const activateBtn = document.getElementById('activateBtn');
    const status = document.getElementById('status');

    let audioContext;
    let recorder;
    let ws;

    function connect() {
      const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
      ws = new WebSocket(`${protocol}//${window.location.host}`);
      ws.binaryType = 'arraybuffer';

      ws.onopen = () => {
        status.textContent = 'Соединение установлено';
      };

      ws.onmessage = async (event) => {
        const audioBlob = new Blob([event.data], { type: 'audio/wav' });
        const audio = new Audio(URL.createObjectURL(audioBlob));
        status.textContent = 'Воспроизведение...';
        await audio.play();
        status.textContent = 'Готов к новой фразе';
      };

      ws.onclose = () => {
        status.textContent = 'Соединение потеряно, переподключение...';
        setTimeout(connect, 2000);
      };

      ws.onerror = (err) => {
        console.error('WebSocket error:', err);
      };
    }

    connect();

    activateBtn.onclick = async () => {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        audioContext = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 16000 });
        const input = audioContext.createMediaStreamSource(stream);
        recorder = new Recorder(input, { numChannels: 1 });

        activateBtn.disabled = true;
        status.textContent = 'Зажмите и говорите';

        // Запись и отправка аудио при отпускании мыши/пальца
        document.body.onmousedown = document.body.ontouchstart = () => {
          if (recorder) {
            if (audioContext.state === 'suspended') audioContext.resume();
            recorder.clear();
            recorder.record();
            status.textContent = 'Запись...';
          }
        };
        document.body.onmouseup = document.body.ontouchend = () => {
          if (recorder) {
            recorder.stop();
            status.textContent = 'Отправка на перевод...';
            recorder.exportWAV((blob) => {
              const reader = new FileReader();
              reader.onload = () => {
                const base64Audio = reader.result.split(',')[1];
                ws.send(JSON.stringify({ type: 'voice_command', audio: base64Audio }));
              };
              reader.readAsDataURL(blob);
            });
          }
        };
      } catch (err) {
        status.textContent = 'Ошибка доступа к микрофону: ' + err.message;
      }
    };
  </script>
</body>
</html>
