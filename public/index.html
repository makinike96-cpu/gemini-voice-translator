<script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        let ws;
        let audioContext;
        let recorder;
        let isRecording = false;
        const micBtn = document.getElementById('micBtn');
        const status = document.getElementById('status');

        function connect() {
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            ws = new WebSocket(`${protocol}//${window.location.host}`);
            
            ws.onopen = () => {
                status.innerText = "Готов к работе";
                ws.send(JSON.stringify({ type: 'setup', pair: document.getElementById('langPair').value }));
            };

            ws.onmessage = async (event) => {
                const audioBlob = new Blob([event.data], { type: 'audio/wav' });
                const audio = new Audio(URL.createObjectURL(audioBlob));
                status.innerText = "Играю перевод...";
                await audio.play();
                status.innerText = "Готов";
            };

            ws.onclose = () => {
                status.innerText = "Переподключение...";
                setTimeout(connect, 2000);
            };
        }

        connect();

        async function startRecording() {
            try {
                if (!audioContext) {
                    audioContext = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 16000 });
                }
                if (audioContext.state === 'suspended') {
                    await audioContext.resume();
                }

                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                const input = audioContext.createMediaStreamSource(stream);
                recorder = new Recorder(input, { numChannels: 1 });
                
                recorder.record();
                isRecording = true;
                micBtn.classList.add('recording');
                status.innerText = "Слушаю...";
            } catch (err) {
                status.innerText = "Ошибка микрофона: " + err.message;
            }
        }

        function stopRecording() {
            if (recorder && isRecording) {
                recorder.stop();
                isRecording = false;
                micBtn.classList.remove('recording');
                status.innerText = "Обработка...";
                
                recorder.exportWAV((blob) => {
                    console.log("Размер файла:", blob.size);
                    if (blob.size > 1000) { // Отправляем только если файл больше 1Кб
                        ws.send(blob);
                    } else {
                        status.innerText = "Слишком коротко, повторите";
                    }
                });
            }
        }

        // Обработка нажатий
        micBtn.onmousedown = micBtn.ontouchstart = (e) => {
            e.preventDefault();
            startRecording();
        };

        micBtn.onmouseup = micBtn.ontouchend = (e) => {
            e.preventDefault();
            stopRecording();
        };
    </script>
