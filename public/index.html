<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Voice Translator AI</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/recorderjs/0.1.0/recorder.js"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #000; color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .container { text-align: center; width: 85%; max-width: 400px; }
        h1 { font-size: 24px; margin-bottom: 10px; color: #fff; }
        .instruction { font-size: 16px; color: #8e8e93; margin-bottom: 40px; line-height: 1.4; }
        .highlight { color: #34c759; font-weight: bold; }
        
        #activateBtn { width: 100%; padding: 20px; border-radius: 16px; border: none; background: #34c759; color: white; font-size: 18px; font-weight: 600; cursor: pointer; transition: 0.2s; }
        #activateBtn:active { transform: scale(0.98); opacity: 0.8; }
        
        #micBtn { width: 140px; height: 140px; border-radius: 50%; border: none; background: #0a84ff; color: white; font-size: 50px; cursor: pointer; display: none; box-shadow: 0 0 30px rgba(10,132,255,0.3); -webkit-tap-highlight-color: transparent; }
        #micBtn.recording { background: #ff3b30; transform: scale(1.1); box-shadow: 0 0 50px rgba(255,59,48,0.5); }
        
        .status { margin-top: 30px; font-size: 15px; color: #636366; min-height: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Переводи на любой язык</h1>
        <p class="instruction">
            Чтобы перевести, просто скажи в микрофон:<br>
            <span class="highlight">"Переведи с русского на польский: [твой текст]"</span>
        </p>
        
        <button id="activateBtn">Включить микрофон</button>
        <button id="micBtn">🎤</button>
        
        <div id="status" class="status">Нажмите кнопку выше</div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        let ws;
        let audioContext;
        let recorder;
        const micBtn = document.getElementById('micBtn');
        const activateBtn = document.getElementById('activateBtn');
        const status = document.getElementById('status');

        function connect() {
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            ws = new WebSocket(`${protocol}//${window.location.host}`);
            ws.onopen = () => { status.innerText = "Соединение установлено"; };
            ws.onmessage = async (event) => {
                const audioBlob = new Blob([event.data], { type: 'audio/wav' });
                const audio = new Audio(URL.createObjectURL(audioBlob));
                status.innerText = "Воспроизведение...";
                await audio.play();
                status.innerText = "Готов к новой фразе";
            };
            ws.onclose = () => { setTimeout(connect, 2000); };
        }
        connect();

        activateBtn.onclick = async () => {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                audioContext = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 16000 });
                const input = audioContext.createMediaStreamSource(stream);
                recorder = new Recorder(input, { numChannels: 1 });
                
                activateBtn.style.display = 'none';
                micBtn.style.display = 'inline-block';
                status.innerText = "Зажмите микрофон и говорите";
            } catch (err) {
                status.innerText = "Ошибка доступа: " + err.message;
            }
        };

        function start() {
            if (recorder) {
                if (audioContext.state === 'suspended') audioContext.resume();
                recorder.clear();
                recorder.record();
                micBtn.classList.add('recording');
                status.innerText = "Слушаю...";
            }
        }

        function stop() {
            if (recorder) {
                recorder.stop();
                micBtn.classList.remove('recording');
                status.innerText = "Обработка AI...";
                recorder.exportWAV((blob) => {
                    const reader = new FileReader();
                    reader.onload = () => {
                        const base64Audio = reader.result.split(',')[1];
                        ws.send(JSON.stringify({ type: 'voice_command', audio: base64Audio }));
                    };
                    reader.readAsDataURL(blob);
                });
            }
        }

        micBtn.onmousedown = micBtn.ontouchstart = (e) => { e.preventDefault(); start(); };
        micBtn.onmouseup = micBtn.ontouchend = (e) => { e.preventDefault(); stop(); };
    </script>
</body>
</html>
